groups:
  - name: rent-ready-alerts
    interval: 30s
    rules:
      # ========================================
      # Application Alerts
      # ========================================
      - alert: HighErrorRate
        expr: |
          sum(rate(http_requests_total{job="rent-ready-app",status=~"5.."}[5m])) by (job)
          /
          sum(rate(http_requests_total{job="rent-ready-app"}[5m])) by (job) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: High error rate detected
          description: "Service rent-ready-app has error rate > 5% for 5 minutes on staging"

      - alert: HighResponseTime
        expr: |
          histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job="rent-ready-app"}[5m])) by (le)) > 3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: High response time
          description: "rent-ready-app P95 latency > 3s on staging"

      # ========================================
      # Database Alerts
      # ========================================
      - alert: PostgresConnectionsNearLimit
        expr: |
          pg_stat_activity_count / pg_settings_max_connections > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: PostgreSQL connections near limit
          description: "{{ $value }}% of max connections used"

      - alert: PostgresReplicationLag
        expr: pg_replication_lag_seconds > 10
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: PostgreSQL replication lag detected
          description: "Replication lag is {{ $value }}s"

      # ========================================
      # Redis Alerts
      # ========================================
      - alert: RedisHighMemoryUsage
        expr: |
          redis_memory_used_bytes / redis_memory_max_bytes > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Redis high memory usage
          description: "Redis using {{ $value }}% of max memory"

      # ========================================
      # System Alerts
      # ========================================
      - alert: HighCPUUsage
        expr: 100 - avg(irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: High CPU usage
          description: "CPU usage is {{ $value }}%"

      - alert: HighMemoryUsage
        expr: |
          (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: High memory usage
          description: "Memory usage is {{ $value }}%"

      - alert: DiskSpaceLow
        expr: |
          (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 20
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: Low disk space
          description: "Only {{ $value }}% disk space remaining"

  # ========================================
  # Uptime / Availability Alerts
  # ========================================
  - alert: StagingHealthDown
        expr: probe_success{job="blackbox-http", env="staging"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Staging /health endpoint is down"
          description: "The staging health endpoint has been unreachable for more than 2 minutes"

  - alert: StagingHealthSlow
        expr: |
          probe_http_duration_seconds{job="blackbox-http", env="staging", phase="ready"} > 3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Staging health endpoint is slow"
          description: "Staging /health response time > 3s for 5 minutes"