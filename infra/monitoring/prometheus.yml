# ========================================
# Prometheus Configuration
# ========================================
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'rent-ready-prod'

rule_files:
  - '/etc/prometheus/alerts/*.yml'

scrape_configs:
  # ========================================
  # Application Metrics
  # ========================================
  - job_name: 'rent-ready-app'
    static_configs:
      - targets: ['app:3000']
    metrics_path: '/api/metrics'
    scheme: http

  # ========================================
  # PostgreSQL Exporter
  # ========================================
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  # ========================================
  # Redis Exporter
  # ========================================
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  # ========================================
  # Node Exporter (System Metrics)
  # ========================================
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

  # ========================================
  # Nginx Exporter
  # ========================================
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx-exporter:9113']

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']