# ========================================
# Alertmanager Configuration
# ========================================

global:
  resolve_timeout: 5m

route:
  receiver: 'default'
  group_by: ['alertname', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  routes:
    # Critical alerts → page immediately
    - match:
        severity: critical
      receiver: 'critical-alerts'
      continue: true
    # Warning alerts → notify during business hours
    - match:
        severity: warning
      receiver: 'warning-alerts'

receivers:
  # ──────────────────────────────────────
  # Default / informational receiver
  # ──────────────────────────────────────
  - name: 'default'
    webhook_configs:
      - url: ${ALERT_WEBHOOK_URL:-http://localhost:13001/webhooks/generic}
        send_resolved: true

  # ──────────────────────────────────────
  # Critical alerts (24/7 — email + webhook)
  # ──────────────────────────────────────
  - name: 'critical-alerts'
    email_configs:
      - to: ${CRITICAL_ALERT_EMAIL:-devops@example.com}
        from: ${SMTP_FROM:-alerts@example.com}
        smarthost: ${SMTP_HOST:-localhost:587}
        send_resolved: true
    webhook_configs:
      - url: ${CRITICAL_WEBHOOK_URL:-http://localhost:13001/webhooks/generic}
        send_resolved: true

  # ──────────────────────────────────────
  # Warning alerts (business hours only)
  # ──────────────────────────────────────
  - name: 'warning-alerts'
    email_configs:
      - to: ${WARNING_ALERT_EMAIL:-team@example.com}
        from: ${SMTP_FROM:-alerts@example.com}
        smarthost: ${SMTP_HOST:-localhost:587}
        send_resolved: true

inhibit_rules:
  # Suppress low-priority alerts when a high-priority one is firing
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['alertname', 'service']
