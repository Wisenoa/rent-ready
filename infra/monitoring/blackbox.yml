# ========================================
# Blackbox Exporter Configuration
# ========================================
# Probes HTTP endpoints for uptime monitoring

modules:
  # ──────────────────────────────────────
  # HTTP GET probe — health endpoint
  # ──────────────────────────────────────
  http_2xx:
    prober: http
    timeout: 10s
    http:
      method: GET
      preferred_ip_protocol: ip4
      valid_http_versions:
        - HTTP/1.1
        - HTTP/2
      no_follow_redirects: false
      fail_if_ssl: false
      fail_if_not_ssl: false

  # ──────────────────────────────────────
  # HTTP GET probe with bearer token
  # ──────────────────────────────────────
  http_bearer:
    prober: http
    timeout: 10s
    http:
      method: GET
      preferred_ip_protocol: ip4
      headers:
        Authorization: Bearer ${BEARER_TOKEN}
