# ========================================
# Nginx Configuration for Rent-Ready Production
# ========================================

# Rate Limiting Zone
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# SSL Configuration
ssl_protocols TLSv1.2 TLSv1.3;
ssl_prefer_server_ciphers on;
ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
ssl_session_cache shared:SSL:10m;
ssl_session_timeout 10m;

# Security Headers
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https:; frame-ancestors 'self';" always;

# Gzip Compression
gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_proxied any;
gzip_comp_level 6;
gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml +rss application/atom+xml image/svg+xml;

# Upstream Configuration
upstream rent_ready_app {
    least_conn;
    server app1:3000 max_fails=3 fail_timeout=30s;
    server app2:3000 max_fails=3 fail_timeout=30s;
    server app3:3000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# ========================================
# Main Server Block (HTTPS)
# ========================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name your-domain.com www.your-domain.com;

    # SSL Certificates (Let's Encrypt or custom)
    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # Security
    limit_conn conn_limit 20;

    # Logging
    access_log /var/log/nginx/rent-ready.access.log combined;
    error_log /var/log/nginx/rent-ready.error.log warn;

    # Root
    root /var/www/rent-ready/public;
    
    # ========================================
    # Static Files (CDN-optimized)
    # ========================================
    location /_next/static/ {
        alias /var/www/rent-ready/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";
    }

    location /public/ {
        alias /var/www/rent-ready/public/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ========================================
    # API Endpoints (with rate limiting)
    # ========================================
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        
        proxy_pass http://rent_ready_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $binary_remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 90s;
        proxy_connect_timeout 60s;
    }

    # ========================================
    # Bank Webhook Endpoints (Bridge/Powens)
    # ========================================
    location /api/webhooks/bank/ {
        limit_req zone=api_limit burst=50 nodelay;
        limit_conn conn_limit 50;
        
        proxy_pass http://rent_ready_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $binary_remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Webhook-Provider "bank";
        proxy_read_timeout 30s;
    }

    # ========================================
    # Stripe Webhook Endpoint
    # ========================================
    location /api/webhooks/stripe {
        limit_req zone=api_limit burst=10 nodelay;
        
        proxy_pass http://rent_ready_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $binary_remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ========================================
    # Health Check
    # ========================================
    location /api/health {
        access_log off;
        proxy_pass http://rent_ready_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ========================================
    # Main Application
    # ========================================
    location / {
        proxy_pass http://rent_ready_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $binary_remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}

# ========================================
# HTTP Redirect to HTTPS
# ========================================
server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com www.your-domain.com;
    
    # Redirect all HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}