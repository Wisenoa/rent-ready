# ========================================
# Docker Compose Override for Staging
# ========================================
version: '3.9'

services:
  # ========================================
  # Staging Database (separate instance)
  # ========================================
  postgres:
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rentready}}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rentready_staging_2026}
      POSTGRES_DB: ${POSTGRES_DB:-rentready_staging}

  # ========================================
  # Staging App with Debugging
  # ========================================
  app:
    environment:
      NODE_ENV: staging
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://staging.your-domain.com}
      SENTRY_ENVIRONMENT: staging
      LOG_LEVEL: debug
    volumes:
      - ./logs:/app/logs