# ========================================
# Docker Compose — Monitoring Stack (Staging)
# ========================================
# Includes: Prometheus, Grafana, Alertmanager
# for staging environment observability
# ========================================

version: '3.9'

services:
  # ========================================
  # Prometheus — Metrics Collection
  # ========================================
  prometheus:
    image: prom/prometheus:v3.0.1
    container_name: rent-ready-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    networks:
      - rent-ready-monitoring

  # ========================================
  # Grafana — Dashboards & Visualization
  # ========================================
  grafana:
    image: grafana/grafana:11.4.2
    container_name: rent-ready-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:9090}
      GF_FEATURE_TOGGLES: "publicDashboards"
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/monitoring/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - rent-ready-monitoring

  # ========================================
  # Alertmanager — Alert Routing
  # ========================================
  alertmanager:
    image: prom/alertmanager:v0.28.1
    container_name: rent-ready-alertmanager
    restart: unless-stopped
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.listen-address=:9093'
    ports:
      - "9093:9093"
    volumes:
      - ./infra/monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    networks:
      - rent-ready-monitoring

  # ========================================
  # Node Exporter — System Metrics
  # ========================================
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: rent-ready-node-exporter
    restart: unless-stopped
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/host'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host:ro
    ports:
      - "9100:9100"
    networks:
      - rent-ready-monitoring

  # ========================================
  # PostgreSQL Exporter
  # ========================================
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: rent-ready-postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-rentready}:${POSTGRES_PASSWORD:-rentre...2026}@postgres:5432/${POSTGRES_DB:-rentready_staging}?sslmode=disable"
    command:
      - '--extend.query-path=/etc/postgres-exporter/queries.yml'
    volumes:
      - ./infra/monitoring/postgres-queries.yml:/etc/postgres-exporter/queries.yml:ro
    ports:
      - "9187:9187"
    depends_on:
      - postgres
    networks:
      - rent-ready-monitoring

  # ========================================
  # Redis Exporter
  # ========================================
  redis-exporter:
    image: oliver006/redis_exporter:v1.67.0
    container_name: rent-ready-redis-exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: "redis://redis:6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
    ports:
      - "9121:9121"
    depends_on:
      - redis
    networks:
      - rent-ready-monitoring

  # ========================================
  # Blackbox Exporter — HTTP/TCP Uptime Checks
  # ========================================
  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    container_name: rent-ready-blackbox
    restart: unless-stopped
    command:
      - '--config.file=/etc/blackbox/blackbox.yml'
      - '--web.listen-address=:9115'
    ports:
      - "9115:9115"
    volumes:
      - ./infra/monitoring/blackbox.yml:/etc/blackbox/blackbox.yml:ro
    networks:
      - rent-ready-monitoring

volumes:
  prometheus_data:
  grafana_data:
  alertmanager_data:

networks:
  rent-ready-monitoring:
    name: rent-ready-monitoring
    driver: bridge
    external: false
