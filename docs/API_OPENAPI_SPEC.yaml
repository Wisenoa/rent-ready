openapi: 3.0.3
info:
  title: RentReady API
  description: |
    Backend API for RentReady — rental property management SaaS.
    
    ## Base URL
    `http://localhost:3000/api` (local) · Production URL configured via `NEXT_PUBLIC_APP_URL`
    
    ## Authentication
    All endpoints (except `/auth/*`) require a session cookie set by the Better Auth flow.
    Use `POST /auth/sign-in` to obtain a session.
    
    ## Content-Type
    All request/response bodies use `application/json`.
    
    ## Errors
    Standard error shape: `{ "error": string }` with appropriate HTTP status code.
  version: 1.0.0
  contact:
    name: RentReady API Support
    email: api@rentready.fr

servers:
  - url: http://localhost:3000
    description: Local development

tags:
  - name: Auth
    description: Authentication and session management
  - name: Properties
    description: Property CRUD operations
  - name: Tenants
    description: Tenant CRUD operations
  - name: Leases
    description: Lease lifecycle management
  - name: Transactions
    description: Payment recording and tracking
  - name: Documents
    description: Document upload and retrieval for leases
  - name: Bank Accounts
    description: Stripe Financial Connections for bank account linking
  - name: Units
    description: Multi-unit building support — manage individual units within a property
  - name: Guarantors
    description: Guarantor management for lease financial backing

  # ─── Fiscal ────────────────────────────────────────────────────────────────
  /fiscal/prepare:
    get:
      tags: [Fiscal]
      summary: Prepare 2577 declaration data for a tax year
      operationId: prepareFiscalDeclaration
      description: |
        Groups revenue and expenses by property for the French tax form 2577
        (déclaration des revenus fonciers). Returns rent + charges received
        per property for the specified year.
      parameters:
        - name: year
          in: query
          schema:
            type: integer
          description: Tax year (default: previous calendar year)
          example: 2025
      responses:
        "200":
          description: Fiscal declaration data per property
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        propertyId:
                          type: string
                        propertyName:
                          type: string
                        address:
                          type: string
                        totalRent:
                          type: number
                        totalCharges:
                          type: number
                        transactions:
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                type: string
                              amount:
                                type: number
                              paidAt:
                                type: string
                                format: date-time
                              periodStart:
                                type: string
                                format: date
                              tenantName:
                                type: string
                  year:
                    type: integer
        "401":
          description: Unauthorized
        "400":
          description: Invalid year parameter

  # ─── Webhooks ─────────────────────────────────────────────────────────────
  /webhooks/bank:
    post:
      tags: [Webhooks]
      summary: Open Banking webhook handler (Bridge API / Powens)
      operationId: handleBankWebhook
      description: |
        Receives `transaction.created` events from Bridge API (DSP2 bank scraping).
        On incoming rent payment: matches to a pending transaction and auto-
        reconciles it, generating a quittance PDF.
      security:
        - hmacSignature: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                event_type:
                  type: string
                item_id:
                  type: string
                account_id:
                  type: string
                transaction:
                  type: object
                  properties:
                    id:
                      type: string
                    amount:
                      type: number
                    currency_code:
                      type: string
                    description:
                      type: string
                    date:
                      type: string
      responses:
        "200":
          description: Webhook processed successfully
        "400":
          description: Invalid payload
        "401":
          description: Invalid HMAC signature

  /webhooks/stripe:
    post:
      tags: [Webhooks]
      summary: Stripe webhook handler
      operationId: handleStripeWebhook
      description: |
        Handles Stripe events: subscription lifecycle, customer updates,
        payment failures, and Financial Connections account refreshes.
      security:
        - stripeSignature: []
      responses:
        "200":
          description: Webhook processed successfully
        "400":
          description: Invalid Stripe signature or payload

  # ─── Transactions (update) ──────────────────────────────────────────────
  /transactions/{transactionId}:
    get:
      tags: [Transactions]
      summary: Get a transaction by ID
      operationId: getTransaction
      parameters:
        - $ref: "#/components/parameters/TransactionId"
      responses:
        "200":
          description: Transaction detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Transaction"
        "401":
          description: Unauthorized
        "404":
          description: Transaction not found
    patch:
      tags: [Transactions]
      summary: Update a transaction (mark paid, change status)
      operationId: updateTransaction
      description: |
        Update payment status, payment method, or notes on an existing transaction.
        Used to manually reconcile or adjust a transaction.
      parameters:
        - $ref: "#/components/parameters/TransactionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [PENDING, PAID, PARTIAL, WAIVED]
                paymentMethod:
                  type: string
                  enum: [BANK_TRANSFER, CHECK, CASH, ONLINE, OTHER]
                paidAt:
                  type: string
                  format: date-time
                  nullable: true
                notes:
                  type: string
                  nullable: true
      responses:
        "200":
          description: Transaction updated
        "400":
          description: Validation error
        "401":
          description: Unauthorized
        "404":
          description: Transaction not found
    /transactions/{transactionId}/receipt:
      get:
        tags: [Transactions]
        summary: Get a transaction receipt
        operationId: getTransactionReceipt
        parameters:
          - $ref: "#/components/parameters/TransactionId"
        responses:
          "200":
            description: Receipt document
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    data:
                      $ref: "#/components/schemas/Receipt"
          "401":
            description: Unauthorized
          "404":
            description: Transaction not found

paths:
  # ─── Auth ───────────────────────────────────────────────────────────────────
  /auth/sign-in:
    post:
      tags: [Auth]
      summary: Sign in with email and password
      operationId: signIn
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: marie.dupont@email.fr
                password:
                  type: string
                  format: password
                  minLength: 8
                  example: MonMotDePasse123!
      responses:
        "200":
          description: Session established
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/User"
        "401":
          description: Invalid credentials

  /auth/sign-in/email-link:
    post:
      tags: [Auth]
      summary: Send a magic link for password-free sign-in
      operationId: sendMagicLink
      description: |
        Sends a one-time magic link to the provided email address.
        The link expires in 15 minutes and can only be used once.
        Clicking the link completes the sign-in flow automatically.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                  example: marie.dupont@email.fr
      responses:
        "200":
          description: Magic link sent successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Magic link sent — check your inbox"
        "400":
          description: Invalid email address
        "500":
          description: Failed to send email

  /auth/sign-up:
    post:
      tags: [Auth]
      summary: Create a new account
      operationId: signUp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                firstName:
                  type: string
                lastName:
                  type: string
      responses:
        "200":
          description: Account created and session established
        "400":
          description: Validation error or email already exists

  /auth/sign-out:
    post:
      tags: [Auth]
      summary: Sign out and destroy session
      operationId: signOut
      responses:
        "200":
          description: Signed out successfully

  /auth/get-session:
    get:
      tags: [Auth]
      summary: Get current session
      operationId: getSession
      responses:
        "200":
          description: Current session user
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/User"
        "401":
          description: No active session

  # ─── Properties ───────────────────────────────────────────────────────────
  /properties:
    get:
      tags: [Properties]
      summary: List all properties
      operationId: listProperties
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated list of properties
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Property"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
        "401":
          description: Unauthorized
    post:
      tags: [Properties]
      summary: Create a property
      operationId: createProperty
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PropertyInput"
      responses:
        "201":
          description: Property created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Property"
        "400":
          description: Validation error
        "401":
          description: Unauthorized

  /properties/{propertyId}:
    get:
      tags: [Properties]
      summary: Get a property by ID
      operationId: getProperty
      parameters:
        - $ref: "#/components/parameters/PropertyId"
      responses:
        "200":
          description: Property with active leases, units, and ticket counts
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/PropertyDetail"
        "401":
          description: Unauthorized
        "404":
          description: Property not found
    patch:
      tags: [Properties]
      summary: Update a property
      operationId: updateProperty
      parameters:
        - $ref: "#/components/parameters/PropertyId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PropertyInput"
      responses:
        "200":
          description: Property updated
        "400":
          description: Validation error
        "401":
          description: Unauthorized
        "404":
          description: Property not found
    delete:
      tags: [Properties]
      summary: Delete a property
      operationId: deleteProperty
      parameters:
        - $ref: "#/components/parameters/PropertyId"
      responses:
        "200":
          description: Property deleted
        "401":
          description: Unauthorized
        "404":
          description: Property not found

  # ─── Tenants ──────────────────────────────────────────────────────────────
  /tenants:
    get:
      tags: [Tenants]
      summary: List all tenants
      operationId: listTenants
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated list of tenants
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Tenant"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
        "401":
          description: Unauthorized
    post:
      tags: [Tenants]
      summary: Create a tenant
      operationId: createTenant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TenantInput"
      responses:
        "201":
          description: Tenant created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Tenant"
        "400":
          description: Validation error
        "401":
          description: Unauthorized

  /tenants/{tenantId}:
    get:
      tags: [Tenants]
      summary: Get a tenant by ID
      operationId: getTenant
      parameters:
        - $ref: "#/components/parameters/TenantId"
      responses:
        "200":
          description: Tenant detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/TenantDetail"
        "401":
          description: Unauthorized
        "404":
          description: Tenant not found
    patch:
      tags: [Tenants]
      summary: Update a tenant
      operationId: updateTenant
      parameters:
        - $ref: "#/components/parameters/TenantId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TenantInput"
      responses:
        "200":
          description: Tenant updated
        "400":
          description: Validation error
        "401":
          description: Unauthorized
        "404":
          description: Tenant not found
    delete:
      tags: [Tenants]
      summary: Delete a tenant
      operationId: deleteTenant
      parameters:
        - $ref: "#/components/parameters/TenantId"
      responses:
        "200":
          description: Tenant deleted
        "401":
          description: Unauthorized
        "404":
          description: Tenant not found

  # ─── Leases ────────────────────────────────────────────────────────────────
  /leases:
    get:
      tags: [Leases]
      summary: List all leases
      operationId: listLeases
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - name: status
          in: query
          schema:
            type: string
            enum: [ACTIVE, TERMINATED, DRAFT, EXPIRED]
          description: Filter by lease status
        - name: propertyId
          in: query
          schema:
            type: string
          description: Filter by property
        - name: tenantId
          in: query
          schema:
            type: string
          description: Filter by tenant
      responses:
        "200":
          description: Paginated list of leases
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/LeaseListItem"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
        "401":
          description: Unauthorized
    post:
      tags: [Leases]
      summary: Create a lease (generates bail PDF)
      operationId: createLease
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeaseInput"
      responses:
        "201":
          description: Lease created with bail PDF generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/LeaseDetail"
        "400":
          description: Validation error
        "401":
          description: Unauthorized
        "404":
          description: Property or tenant not found

  /leases/{leaseId}:
    get:
      tags: [Leases]
      summary: Get a lease by ID
      operationId: getLease
      parameters:
        - $ref: "#/components/parameters/LeaseId"
      responses:
        "200":
          description: Lease detail with related records
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/LeaseDetail"
        "401":
          description: Unauthorized
        "404":
          description: Lease not found
    patch:
      tags: [Leases]
      summary: Update a lease
      operationId: updateLease
      parameters:
        - $ref: "#/components/parameters/LeaseId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeaseInput"
      responses:
        "200":
          description: Lease updated
        "400":
          description: Validation error
        "401":
          description: Unauthorized
        "404":
          description: Lease not found

  # ─── Transactions ────────────────────────────────────────────────────────────
  /transactions:
    get:
      tags: [Transactions]
      summary: List transactions
      operationId: listTransactions
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - name: status
          in: query
          schema:
            type: string
            enum: [PENDING, PAID, PARTIAL, WAIVED]
          description: Filter by payment status
        - name: leaseId
          in: query
          schema:
            type: string
          description: Filter by lease
        - name: startDate
          in: query
          schema:
            type: string
            format: date
          description: Filter due dates from this date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
          description: Filter due dates up to this date
      responses:
        "200":
          description: Paginated list of transactions
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Transaction"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
        "401":
          description: Unauthorized
    post:
      tags: [Transactions]
      summary: Record a payment (generates quittance/recu PDF)
      operationId: createTransaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionInput"
      responses:
        "201":
          description: Payment recorded and receipt generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Transaction"
        "400":
          description: Validation error
        "401":
          description: Unauthorized
        "404":
          description: Lease not found


  # ─── Documents ───────────────────────────────────────────────────────────────
  /documents/{documentId}:
    get:
      tags: [Documents]
      summary: Get a document by ID (presigned URL or redirect)
      operationId: getDocument
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: string
          description: Document ID
      responses:
        "200":
          description: Document metadata or presigned download URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Document"
        "401":
          description: Unauthorized
        "404":
          description: Document not found
    delete:
      tags: [Documents]
      summary: Delete a document by ID
      operationId: deleteDocument
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: string
          description: Document ID
      responses:
        "200":
          description: Document deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Document not found

  # ─── Bank Accounts (Stripe Financial Connections) ──────────────────────────
  /bank-accounts/link-token:
    post:
      tags: [Bank Accounts]
      summary: Create a Stripe Financial Connections link token
      operationId: createBankLinkToken
      description: |
        Creates a Link token for Stripe Financial Connections, allowing users
        to securely connect their bank account for balance checks and payment parsing.
        Requires active Stripe subscription.
      responses:
        "200":
          description: Link token created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      linkToken:
                        type: string
                      url:
                        type: string
                        description: URL to redirect the user to for bank linking flow
        "401":
          description: Unauthorized
        "403":
          description: Stripe subscription required
        "500":
          description: Stripe API error

  /bank-accounts/sessions:
    post:
      tags: [Bank Accounts]
      summary: Create a Stripe Financial Connections account session
      operationId: createBankAccountSession
      description: |
        Creates a Session for Financial Connections to retrieve data from an
        already-linked external account (balance, transactions).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [externalAccountId]
              properties:
                externalAccountId:
                  type: string
                  description: Stripe External Account ID from a linked bank account
      responses:
        "200":
          description: Account session created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      session:
                        type: object
                        description: Stripe FinancialConnections.Session object
        "401":
          description: Unauthorized
        "400":
          description: Invalid external account ID
        "500":
          description: Stripe API error

  /bank-accounts:
    get:
      tags: [Bank Accounts]
      summary: List user's linked bank accounts
      operationId: listBankAccounts
      description: Returns all Stripe Financial Connections linked accounts for the user.
      responses:
        "200":
          description: List of linked bank accounts
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/BankAccount"
        "401":
          description: Unauthorized

  /units:
    get:
      tags: [Units]
      summary: List all units
      operationId: listUnits
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - name: propertyId
          in: query
          description: Filter by property ID
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          description: Filter by status
          schema:
            type: string
            enum: [VACANT, RENTED, DRAFT]
      responses:
        "200":
          description: Paginated list of units
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Unit"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
        "401":
          description: Unauthorized

    post:
      tags: [Units]
      summary: Create a new unit
      operationId: createUnit
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UnitCreate"
      responses:
        "201":
          description: Unit created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Unit"
        "400":
          description: Validation error
        "401":
          description: Unauthorized
        "404":
          description: Property not found

  /units/{unitId}:
    get:
      tags: [Units]
      summary: Get a unit by ID
      operationId: getUnit
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UnitId"
      responses:
        "200":
          description: Unit details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Unit"
        "401":
          description: Unauthorized
        "404":
          description: Unit not found

    patch:
      tags: [Units]
      summary: Update a unit
      operationId: updateUnit
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UnitId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UnitCreate"
      responses:
        "200":
          description: Unit updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Unit"
        "400":
          description: Validation error
        "401":
          description: Unauthorized
        "404":
          description: Unit not found

    delete:
      tags: [Units]
      summary: Delete a unit
      operationId: deleteUnit
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/UnitId"
      responses:
        "200":
          description: Unit deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        "401":
          description: Unauthorized
        "404":
          description: Unit not found

  # ─── Guarantors ──────────────────────────────────────────────────────────────
  /guarantors:
    get:
      tags: [Guarantors]
      summary: List guarantors for a lease
      operationId: listGuarantors
      security:
        - cookieAuth: []
      parameters:
        - name: leaseId
          in: query
          required: true
