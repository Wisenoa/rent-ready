openapi: 3.0.3
info:
  title: RentReady API
  description: |
    Backend API for RentReady — rental property management SaaS.
    
    ## Base URL
    `http://localhost:3000/api` (local) · Production URL configured via `NEXT_PUBLIC_APP_URL`
    
    ## Authentication
    All endpoints (except `/auth/*`) require a session cookie set by the Better Auth flow.
    Use `POST /auth/sign-in` to obtain a session.
    
    ## Content-Type
    All request/response bodies use `application/json`.
    
    ## Errors
    Standard error shape: `{ "error": string }` with appropriate HTTP status code.
  version: 1.0.0
  contact:
    name: RentReady API Support
    email: api@rentready.fr

servers:
  - url: http://localhost:3000
    description: Local development

tags:
  - name: Auth
    description: Authentication and session management
  - name: Properties
    description: Property CRUD operations
  - name: Tenants
    description: Tenant CRUD operations
  - name: Leases
    description: Lease lifecycle management
  - name: Transactions
    description: Payment recording and tracking
  - name: Documents
    description: Document upload and retrieval for leases
  - name: Bank Accounts
    description: Stripe Financial Connections for bank account linking
  - name: Units
    description: Multi-unit building support — manage individual units within a property
  - name: Guarantors
    description: Guarantor management for lease financial backing

  # ─── Fiscal ────────────────────────────────────────────────────────────────
  /fiscal/prepare:
    get:
      tags: [Fiscal]
      summary: Prepare 2577 declaration data for a tax year
      operationId: prepareFiscalDeclaration
      description: |
        Groups revenue and expenses by property for the French tax form 2577
        (déclaration des revenus fonciers). Returns rent + charges received
        per property for the specified year.
      parameters:
        - name: year
          in: query
          schema:
            type: integer
          description: Tax year (default: previous calendar year)
          example: 2025
      responses:
        "200":
          description: Fiscal declaration data per property
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        propertyId:
                          type: string
                        propertyName:
                          type: string
                        address:
                          type: string
                        totalRent:
                          type: number
                        totalCharges:
                          type: number
                        transactions:
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                type: string
                              amount:
                                type: number
                              paidAt:
                                type: string
                                format: date-time
                              periodStart:
                                type: string
                                format: date
                              tenantName:
                                type: string
                  year:
                    type: integer
        "401":
          description: Unauthorized
        "400":
          description: Invalid year parameter

  # ─── Webhooks ─────────────────────────────────────────────────────────────
  /webhooks/bank:
    post:
      tags: [Webhooks]
      summary: Open Banking webhook handler (Bridge API / Powens)
      operationId: handleBankWebhook
      description: |
        Receives `transaction.created` events from Bridge API (DSP2 bank scraping).
        On incoming rent payment: matches to a pending transaction and auto-
        reconciles it, generating a quittance PDF.
      security:
        - hmacSignature: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                event_type:
                  type: string
                item_id:
                  type: string
                account_id:
                  type: string
                transaction:
                  type: object
                  properties:
                    id:
                      type: string
                    amount:
                      type: number
                    currency_code:
                      type: string
                    description:
                      type: string
                    date:
                      type: string
      responses:
        "200":
          description: Webhook processed successfully
        "400":
          description: Invalid payload
        "401":
          description: Invalid HMAC signature

  /webhooks/stripe:
    post:
      tags: [Webhooks]
      summary: Stripe webhook handler
      operationId: handleStripeWebhook
      description: |
        Handles Stripe events: subscription lifecycle, customer updates,
        payment failures, and Financial Connections account refreshes.
      security:
        - stripeSignature: []
      responses:
        "200":
          description: Webhook processed successfully
        "400":
          description: Invalid Stripe signature or payload

  # ─── Transactions (update) ──────────────────────────────────────────────
  /transactions/{transactionId}:
    get:
      tags: [Transactions]
      summary: Get a transaction by ID
      operationId: getTransaction
      parameters:
        - $ref: "#/components/parameters/TransactionId"
      responses:
        "200":
          description: Transaction detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Transaction"
        "401":
          description: Unauthorized
        "404":
          description: Transaction not found
    patch:
      tags: [Transactions]
      summary: Update a transaction (mark paid, change status)
      operationId: updateTransaction
      description: |
        Update payment status, payment method, or notes on an existing transaction.
        Used to manually reconcile or adjust a transaction.
      parameters:
        - $ref: "#/components/parameters/TransactionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [PENDING, PAID, PARTIAL, WAIVED]
                paymentMethod:
                  type: string
                  enum: [BANK_TRANSFER, CHECK, CASH, ONLINE, OTHER]
                paidAt:
                  type: string
                  format: date-time
                  nullable: true
                notes:
                  type: string
                  nullable: true
      responses:
        "200":
          description: Transaction updated
        "400":
          description: Validation error
        "401":
          description: Unauthorized
        "404":
          description: Transaction not found
  /transactions/{id}/receipt:
    get:
      tags: [Transactions]
      summary: Obtenir un reçu JSON pour une transaction
      operationId: getTransactionReceipt
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Reçu JSON
        "401":
          description: Non autorisé
        "404":
          description: Transaction introuvable
    post:
      tags: [Transactions]
      summary: Générer un PDF quittance pour une transaction
      operationId: generateTransactionReceiptPdf
      description: Produit un PDF de quittance via react-pdf.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: PDF quittance (application/pdf)
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "401":
          description: Non autorisé
        "404":
          description: Transaction introuvable

  /auth/{path}:
    get:
      tags: [Auth]
      summary: Auth proxy (Better Auth routes)
      operationId: authGet
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Auth response
        "401":
          description: Non autorisé
    post:
      tags: [Auth]
      summary: Auth action (sign-in, sign-up, sign-out, reset...)
      operationId: authPost
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Auth action response
        "400":
          description: Données invalides
        "401":
          description: Non autorisé
        "429":
          description: Rate limit

  /e-reporting/export:
    post:
      tags: [E-Reporting]
      summary: Exporter les données pour la déclaration 2072 (SCI)
      operationId: exportReporting
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [year]
              properties:
                year:
                  type: integer
                  description: Année fiscale (ex: 2025)
                propertyIds:
                  type: array
                  items:
                    type: string
                    format: uuid
                format:
                  type: string
                  enum: [json, csv]
                  default: json
      responses:
        "200":
          description: Export généré
        "400":
          description: Données invalides
        "401":
          description: Non autorisé

  /email/send-welcome:
    post:
      tags: [Email]
      summary: Envoyer l'email de bienvenue
      operationId: sendWelcomeEmail
      responses:
        "200":
          description: Email envoyé
        "401":
          description: Non autorisé
        "429":
          description: Rate limit

  /email/send-rent-reminder:
    post:
      tags: [Email]
      summary: Envoyer un rappel de loyer
      operationId: sendRentReminder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [transactionId]
              properties:
                transactionId:
                  type: string
                  format: uuid
                tone:
                  type: string
                  enum: [friendly, formal, legal]
                  default: friendly
      responses:
        "200":
          description: Email envoyé
        "400":
          description: Données invalides
        "401":
          description: Non autorisé
        "404":
          description: Transaction introuvable
        "429":
          description: Rate limit

  /email/send-tenant-invitation:
    post:
      tags: [Email]
      summary: Envoyer une invitation locataire
      operationId: sendTenantInvitation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenantId]
              properties:
                tenantId:
                  type: string
                  format: uuid
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: Invitation envoyée
        "400":
          description: Données invalides
        "401":
          description: Non autorisé
        "404":
          description: Locataire introuvable
        "429":
          description: Rate limit

  /email/send-password-reset:
    post:
      tags: [Email]
      summary: Envoyer un email de réinitialisation de mot de passe
      operationId: sendPasswordReset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: Email envoyé si l'adresse existe
        "400":
          description: Données invalides
        "429":
          description: Rate limit

  /email/send-lease-expiry:
    post:
      tags: [Email]
      summary: Envoyer un email d'expiration de bail
      operationId: sendLeaseExpiry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [leaseId]
              properties:
                leaseId:
                  type: string
                  format: uuid
                daysNotice:
                  type: integer
                  default: 30
      responses:
        "200":
          description: Email envoyé
        "400":
          description: Données invalides
        "401":
          description: Non autorisé
        "404":
          description: Bail introuvable
        "429":
          description: Rate limit

  /email/cron-dispatch:
    post:
      tags: [Email]
      summary: Dispatch automatique des emails batch (cron)
      operationId: cronDispatch
      responses:
        "200":
          description: Emails dispatchés
        "401":
          description: Non autorisé
        "403":
          description: Secret cron manquant

  /onboarding/track:
    post:
      tags: [Onboarding]
      summary: Suivre les étapes d'onboarding
      operationId: trackOnboarding
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [step]
              properties:
                step:
                  type: string
                  enum: [first_property, first_tenant, first_lease, first_payment, completed]
      responses:
        "200":
          description: Étape enregistrée
        "400":
          description: Étape invalide
        "401":
          description: Non autorisé

  /og:
    get:
      tags: [OG]
      summary: Générer une image OG dynamique
      operationId: getOgImage
      parameters:
        - name: title
          in: query
          schema:
            type: string
        - name: description
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
            enum: [tool, template, blog, home]
      responses:
        "200":
          description: Image PNG (image/png)
          content:
            image/png:
              schema:
                type: string
                format: binary
        "400":
          description: Paramètres invalides

  /api-docs:
    get:
      tags: [Docs]
      summary: Documentation interactive de l'API (Scalar)
      operationId: getApiDocs
      responses:
        "200":
          description: Page HTML (text/html)

  /openapi.json:
    get:
      tags: [Docs]
      summary: Spécification OpenAPI 3.1 en JSON
      operationId: getOpenApiSpec
      responses:
        "200":
          description: Document OpenAPI 3.1
          content:
            application/json:
              schema:
                type: object

  /cron/revision-check:
    get:
      tags: [Cron]
      summary: Vérifier les révisions de loyer (IRL) à venir
      operationId: revisionCheck
      parameters:
        - name: daysAhead
          in: query
          schema:
            type: integer
            default: 30
      responses:
        "200":
          description: Résultat du check
        "401":
          description: Non autorisé
        "403":
          description: Secret cron manquant

  /reminders/letter:
    get:
      tags: [Reminders]
      summary: Générer un PDF de lettre de relance
      operationId: getReminderLetterPdf
      parameters:
        - name: transactionId
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: tone
          in: query
          schema:
            type: string
            enum: [friendly, formal, legal]
            default: friendly
      responses:
        "200":
          description: PDF lettre (application/pdf)
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "401":
          description: Non autorisé
        "404":
          description: Transaction introuvable

  # ─── Auth ───────────────────────────────────────────────────────────────────
  /auth/sign-in:
    post:
      tags: [Auth]
      summary: Sign in with email and password
      operationId: signIn
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: marie.dupont@email.fr
                password:
                  type: string
                  format: password
                  minLength: 8
                  example: MonMotDePasse123!
      responses:
        "200":
          description: Session established
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/User"
        "401":
          description: Invalid credentials

  /auth/sign-in/email-link:
    post:
      tags: [Auth]
      summary: Send a magic link for password-free sign-in
      operationId: sendMagicLink
      description: |
        Sends a one-time magic link to the provided email address.
        The link expires in 15 minutes and can only be used once.
        Clicking the link completes the sign-in flow automatically.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                  example: marie.dupont@email.fr
      responses:
        "200":
          description: Magic link sent successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Magic link sent — check your inbox"
        "400":
          description: Invalid email address
        "500":
          description: Failed to send email

  /auth/sign-up:
    post:
      tags: [Auth]
      summary: Create a new account
      operationId: signUp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                firstName:
                  type: string
                lastName:
                  type: string
      responses:
        "200":
          description: Account created and session established
        "400":
          description: Validation error or email already exists

  /auth/sign-out:
    post:
      tags: [Auth]
      summary: Sign out and destroy session
      operationId: signOut
      responses:
        "200":
          description: Signed out successfully

  /auth/get-session:
    get:
      tags: [Auth]
      summary: Get current session
      operationId: getSession
      responses:
        "200":
          description: Current session user
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/User"
        "401":
          description: No active session

  # ─── Properties ───────────────────────────────────────────────────────────
  /properties:
    get:
      tags: [Properties]
      summary: List all properties
      operationId: listProperties
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated list of properties
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Property"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
        "401":
          description: Unauthorized
    post:
      tags: [Properties]
      summary: Create a property
      operationId: createProperty
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PropertyInput"
      responses:
        "201":
          description: Property created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Property"
        "400":
          description: Validation error
        "401":
          description: Unauthorized

  /properties/{propertyId}:
    get:
      tags: [Properties]
      summary: Get a property by ID
      operationId: getProperty
      parameters:
        - $ref: "#/components/parameters/PropertyId"
      responses:
        "200":
          description: Property with active leases, units, and ticket counts
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/PropertyDetail"
        "401":
          description: Unauthorized
        "404":
          description: Property not found
    patch:
      tags: [Properties]
      summary: Update a property
      operationId: updateProperty
      parameters:
        - $ref: "#/components/parameters/PropertyId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PropertyInput"
      responses:
        "200":
          description: Property updated
        "400":
          description: Validation error
        "401":
          description: Unauthorized
        "404":
          description: Property not found
    delete:
      tags: [Properties]
      summary: Delete a property
      operationId: deleteProperty
      parameters:
        - $ref: "#/components/parameters/PropertyId"
      responses:
        "200":
          description: Property deleted
        "401":
          description: Unauthorized
        "404":
          description: Property not found

  # ─── Tenants ──────────────────────────────────────────────────────────────
  /tenants:
    get:
      tags: [Tenants]
      summary: List all tenants
      operationId: listTenants
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated list of tenants
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Tenant"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
        "401":
          description: Unauthorized
    post:
      tags: [Tenants]
      summary: Create a tenant
      operationId: createTenant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TenantInput"
      responses:
        "201":
          description: Tenant created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Tenant"
        "400":
          description: Validation error
        "401":
          description: Unauthorized

  /tenants/{tenantId}:
    get:
      tags: [Tenants]
      summary: Get a tenant by ID
      operationId: getTenant
      parameters:
        - $ref: "#/components/parameters/TenantId"
      responses:
        "200":
          description: Tenant detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/TenantDetail"
        "401":
          description: Unauthorized
        "404":
          description: Tenant not found
    patch:
      tags: [Tenants]
      summary: Update a tenant
      operationId: updateTenant
      parameters:
        - $ref: "#/components/parameters/TenantId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TenantInput"
      responses:
        "200":
          description: Tenant updated
        "400":
          description: Validation error
        "401":
          description: Unauthorized
        "404":
          description: Tenant not found
    delete:
      tags: [Tenants]
      summary: Delete a tenant
      operationId: deleteTenant
      parameters:
        - $ref: "#/components/parameters/TenantId"
      responses:
        "200":
          description: Tenant deleted
        "401":
          description: Unauthorized
        "404":
          description: Tenant not found

  # ─── Leases ────────────────────────────────────────────────────────────────
  /leases:
    get:
      tags: [Leases]
      summary: List all leases
      operationId: listLeases
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - name: status
          in: query
          schema:
            type: string
            enum: [ACTIVE, TERMINATED, DRAFT, EXPIRED]
          description: Filter by lease status
        - name: propertyId
          in: query
          schema:
            type: string
          description: Filter by property
        - name: tenantId
          in: query
          schema:
            type: string
          description: Filter by tenant
      responses:
        "200":
          description: Paginated list of leases
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/LeaseListItem"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
        "401":
          description: Unauthorized
    post:
      tags: [Leases]
      summary: Create a lease (generates bail PDF)
      operationId: createLease
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeaseInput"
      responses:
        "201":
          description: Lease created with bail PDF generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/LeaseDetail"
        "400":
          description: Validation error
        "401":
          description: Unauthorized
        "404":
          description: Property or tenant not found

  /leases/{leaseId}:
    get:
      tags: [Leases]
      summary: Get a lease by ID
      operationId: getLease
      parameters:
        - $ref: "#/components/parameters/LeaseId"
      responses:
        "200":
          description: Lease detail with related records
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/LeaseDetail"
        "401":
          description: Unauthorized
        "404":
          description: Lease not found
    patch:
      tags: [Leases]
      summary: Update a lease
      operationId: updateLease
      parameters:
        - $ref: "#/components/parameters/LeaseId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeaseInput"
      responses:
        "200":
          description: Lease updated
        "400":
          description: Validation error
        "401":
          description: Unauthorized
        "404":
          description: Lease not found

  # ─── Transactions ────────────────────────────────────────────────────────────
  /transactions:
    get:
      tags: [Transactions]
      summary: List transactions
      operationId: listTransactions
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - name: status
          in: query
          schema:
            type: string
            enum: [PENDING, PAID, PARTIAL, WAIVED]
          description: Filter by payment status
        - name: leaseId
          in: query
          schema:
            type: string
          description: Filter by lease
        - name: startDate
          in: query
          schema:
            type: string
            format: date
          description: Filter due dates from this date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
          description: Filter due dates up to this date
      responses:
        "200":
          description: Paginated list of transactions
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Transaction"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
        "401":
          description: Unauthorized
    post:
      tags: [Transactions]
      summary: Record a payment (generates quittance/recu PDF)
      operationId: createTransaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionInput"
      responses:
        "201":
          description: Payment recorded and receipt generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Transaction"
        "400":
          description: Validation error
        "401":
          description: Unauthorized
        "404":
          description: Lease not found


