  # ══════════════════════════════════════════════════════════════════════════════
  # Stripe — Billing and payments
  # ══════════════════════════════════════════════════════════════════════════════

  /stripe/checkout:
    post:
      tags: [Stripe]
      summary: Create a Stripe Checkout session
      operationId: createStripeCheckout
      description: |
        Creates a Stripe Checkout session for one-time payments (premium templates, tools, etc.).
        Rate limited: 20 checkout sessions/min per authenticated user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [priceId, productName]
              properties:
                priceId:
                  type: string
                productName:
                  type: string
                productDescription:
                  type: string
                metadata:
                  type: object
                  additionalProperties:
                    type: string
      responses:
        "200":
          description: Checkout session URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    format: uri
        "400":
          description: priceId and productName are required
        "401":
          description: Unauthorized
        "429":
          description: Rate limit exceeded
        "500":
          description: Stripe API error

  /stripe/plans:
    get:
      tags: [Stripe]
      summary: Get subscription plans
      operationId: getStripePlans
      description: Returns available RentReady Pro subscription plans (monthly and annual) from Stripe.
      responses:
        "200":
          description: Available plans
          content:
            application/json:
              schema:
                type: object
                properties:
                  product:
                    type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                      description:
                        type: string
                  plans:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        label:
                          type: string
                        interval:
                          type: string
                          enum: [month, year]
                        priceId:
                          type: string
                        amount:
                          type: integer
                        currency:
                          type: string
                        trialDays:
                          type: integer
                        pricePerMonth:
                          type: integer
                        total:
                          type: integer
                        annualEquivalent:
                          type: integer
                          nullable: true
        "500":
          description: Stripe not configured or error fetching plans

  /stripe/portal:
    post:
      tags: [Stripe]
      summary: Create a Stripe billing portal session
      operationId: createStripePortal
      description: Creates a Stripe billing portal session for managing subscriptions. Rate limited: 10 sessions/min.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                returnUrl:
                  type: string
                  format: uri
                  description: URL to redirect after exiting the portal
      responses:
        "200":
          description: Portal session URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    format: uri
        "400":
          description: No Stripe customer found
        "401":
          description: Unauthorized
        "429":
          description: Rate limit exceeded
        "500":
          description: Stripe API error

  # ══════════════════════════════════════════════════════════════════════════════
  # Tenant Portal — Token-authenticated tenant-facing API
  # ══════════════════════════════════════════════════════════════════════════════

  /tenant/lease:
    get:
      tags: [Tenant Portal]
      summary: Get tenant's current active lease
      operationId: getTenantLease
      description: |
        Returns the tenant's current active lease details. Supports two auth modes:
        (1) `?token=<tenantAccessToken>` for token-based tenant portal access,
        (2) authenticated owner session for the landlord viewing tenant data.
      parameters:
        - name: token
          in: query
          schema:
            type: string
          description: Tenant access token (alternative to session auth)
      responses:
        "200":
          description: Tenant lease details
          content:
            application/json:
              schema:
                type: object
                properties:
                  lease:
                    type: object
                    properties:
                      id:
                        type: string
                      property:
                        type: object
                      tenant:
                        type: object
                      financials:
                        type: object
                      dates:
                        type: object
                      leaseType:
                        type: string
                      irl:
                        type: object
                      documentUrl:
                        type: string
                        nullable: true
        "400":
          description: Token required for tenant portal access
        "401":
          description: Invalid or expired access token
        "404":
          description: No active lease found

  /tenant/maintenance:
    get:
      tags: [Tenant Portal]
      summary: List tenant's maintenance tickets
      operationId: listTenantMaintenance
      description: Returns maintenance tickets submitted by the tenant via the portal.
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of maintenance tickets
        "401":
          description: Invalid or expired access token
    post:
      tags: [Tenant Portal]
      summary: Submit a maintenance ticket (tenant)
      operationId: submitTenantMaintenance
      description: |
        Allows a tenant to submit a maintenance ticket from the tenant portal.
        Authenticated via `?token=<tenantAccessToken>` in the request body.
        Creates a ticket linked to the tenant's active lease and property.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, title, description]
              properties:
                token:
                  type: string
                  description: Tenant access token
                title:
                  type: string
                  minLength: 5
                description:
                  type: string
                  minLength: 10
                priority:
                  type: string
                  enum: [LOW, MEDIUM, HIGH, URGENT]
                  default: MEDIUM
                attachments:
                  type: array
                  items:
                    type: object
                    properties:
                      fileName:
                        type: string
                      fileUrl:
                        type: string
                        format: uri
                      fileType:
                        type: string
                      fileSize:
                        type: integer
      responses:
        "201":
          description: Ticket submitted
        "400":
          description: Validation error
        "401":
          description: Invalid or expired access token
        "404":
          description: No active lease found for tenant

  /tenant/quittances:
    get:
      tags: [Tenant Portal]
      summary: Get tenant's payment receipts (quittances)
      operationId: getTenantQuittances
      description: |
        Returns payment receipts for the tenant's active lease.
        Authenticated via `?token=<tenantAccessToken>`. Results grouped by month.
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
        - name: year
          in: query
          schema:
            type: string
            pattern: "^[0-9]{4}$"
          description: Filter by year (e.g. "2025")
        - name: status
          in: query
          schema:
            type: string
            enum: [PAID, PENDING, LATE]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        "200":
          description: Quittances grouped by month
          content:
            application/json:
              schema:
                type: object
                properties:
                  quittances:
                    type: object
                    additionalProperties:
                      type: array
                      items:
                        type: object
                  summary:
                    type: object
                    properties:
                      totalPaid:
                        type: number
                      totalPending:
                        type: number
                      totalLate:
                        type: number
                      count:
                        type: object
                  pagination:
                    type: object
        "400":
          description: Token required
        "401":
          description: Invalid or expired access token

  # ══════════════════════════════════════════════════════════════════════════════
  # Transactions — Additional sub-routes
  # ══════════════════════════════════════════════════════════════════════════════

  /transactions/dashboard:
    get:
      tags: [Transactions]
      summary: Get transaction dashboard with monthly breakdown
      operationId: getTransactionDashboard
      description: |
        Returns a detailed payment dashboard with monthly breakdown (by-property
        and aggregate), grand totals, collection rates, and recent transactions.
      parameters:
        - name: months
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 24
            default: 12
          description: Number of months to include
        - name: year
          in: query
          schema:
            type: integer
          description: Filter to specific year
      responses:
        "200":
          description: Transaction dashboard
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      summary:
                        type: object
                      monthlyBreakdown:
                        type: array
                        items:
                          type: object
                      byProperty:
                        type: array
                        items:
                          type: object
                      recentTransactions:
                        type: array
                        items:
                          type: object
        "401":
          description: Unauthorized

  /transactions/unpaid:
    get:
      tags: [Transactions]
      summary: List unpaid transactions
      operationId: listUnpaidTransactions
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: List of unpaid transactions
