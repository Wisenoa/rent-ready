        "404":
          description: Guarantor not found

  # ══════════════════════════════════════════════════════════════════════════════
  # AI — Lease analysis and drafting
  # ══════════════════════════════════════════════════════════════════════════════

  /ai/analyze-lease:
    post:
      tags: [AI]
      summary: Analyze a lease contract for clauses and risks
      operationId: analyzeLease
      description: |
        Uses AI to analyze lease text (provided directly or extracted from a PDF via
        `documentId`) and return a structured risk analysis. Rate limited: 20 req/min
        for unauthenticated, 1000 req/min for authenticated users.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [documentId]
              properties:
                documentId:
                  type: string
                  description: Document ID whose extracted OCR text to analyze
                leaseText:
                  type: string
                  description: Raw lease text to analyze (alternative to documentId)
              example:
                documentId: "doc_abc123"
      responses:
        "200":
          description: Analysis result
          content:
            application/json:
              schema:
                type: object
                properties:
                  analysis:
                    type: object
                    description: AI-generated lease clause analysis
        "400":
          description: No lease text provided or found
        "401":
          description: Unauthorized
        "404":
          description: Document not found
        "429":
          description: Rate limit exceeded

  /ai/follow-up-draft:
    post:
      tags: [AI]
      summary: Generate a rent follow-up email draft
      operationId: generateFollowUpDraft
      description: |
        Generates a rent payment follow-up email draft (friendly, formal, or legal tone)
        for a specific lease and overdue transaction. Rate limited: 20 req/min for
        unauthenticated, 1000 req/min for authenticated.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [leaseId]
              properties:
                leaseId:
                  type: string
                  format: uuid
                tone:
                  type: string
                  enum: [friendly, formal, legal]
                  default: formal
              example:
                leaseId: "123e4567-e89b-12d3-a456-426614174000"
                tone: "formal"
      responses:
        "200":
          description: Generated email draft
          content:
            application/json:
              schema:
                type: object
                properties:
                  draft:
                    type: string
                    description: AI-generated email draft text
        "400":
          description: No overdue transactions found for this lease
        "401":
          description: Unauthorized
        "404":
          description: Lease not found
        "429":
          description: Rate limit exceeded

  /ai/maintenance-summarize:
    post:
      tags: [AI]
      summary: Summarize a maintenance ticket description
      operationId: summarizeMaintenance
      description: Uses AI to summarize a maintenance ticket description into a concise title/summary.
      security:
        - cookieAuth: []
      responses:
        "401":
          description: Unauthorized

  /ai/owner-summary:
    post:
      tags: [AI]
      summary: Generate a property owner summary
      operationId: generateOwnerSummary
      description: Generates a narrative summary of a property owner's portfolio and activity.
      security:
        - cookieAuth: []
      responses:
        "401":
          description: Unauthorized

  # ══════════════════════════════════════════════════════════════════════════════
  # Analytics
  # ══════════════════════════════════════════════════════════════════════════════

  /analytics/page-view:
    post:
      tags: [Analytics]
      summary: Record a page view event
      operationId: recordPageView
      description: Records an anonymous page view event for internal traffic analytics.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path]
              properties:
                path:
                  type: string
                  description: Page path viewed
                referrer:
                  type: string
                utm_source:
                  type: string
                utm_medium:
                  type: string
                utm_campaign:
                  type: string
      responses:
        "200":
          description: Event recorded
        "500":
          description: Internal error

  # ══════════════════════════════════════════════════════════════════════════════
  # Charges — Recoverable charge tracking
  # ══════════════════════════════════════════════════════════════════════════════

  /charges:
    get:
      tags: [Charges]
      summary: List recoverable charges
      operationId: listCharges
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - name: leaseId
          in: query
          schema:
            type: string
            format: uuid
          description: Filter by lease
        - name: isRecovered
          in: query
          schema:
            type: boolean
          description: Filter by recovery status
        - name: category
          in: query
          schema:
            type: string
          description: Filter by charge category
      responses:
        "200":
          description: Paginated list of charges
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Charge"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
        "401":
          description: Unauthorized
    post:
      tags: [Charges]
      summary: Create a recoverable charge
      operationId: createCharge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChargeInput"
      responses:
        "201":
          description: Charge created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Charge"
        "400":
          description: Validation error
        "401":
          description: Unauthorized
        "404":
          description: Lease not found

  /charges/{id}:
    get:
      tags: [Charges]
      summary: Get a charge by ID
      operationId: getCharge
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Charge detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Charge"
        "401":
          description: Unauthorized
        "404":
          description: Charge not found
    patch:
      tags: [Charges]
      summary: Update a charge
      operationId: updateCharge
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChargeInput"
      responses:
        "200":
          description: Charge updated
        "400":
          description: Validation error
        "401":
          description: Unauthorized
        "404":
          description: Charge not found
    delete:
      tags: [Charges]
      summary: Delete a charge
      operationId: deleteCharge
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Charge deleted
        "401":
          description: Unauthorized
        "404":
          description: Charge not found

  # ══════════════════════════════════════════════════════════════════════════════
  # Dashboard — Portfolio summary
  # ══════════════════════════════════════════════════════════════════════════════

  /dashboard/summary:
    get:
      tags: [Dashboard]
      summary: Get portfolio summary
      operationId: getDashboardSummary
      description: |
        Returns high-level metrics for the authenticated user's rental portfolio:
        total properties, tenants, outstanding rent, collection rate, and monthly
        collected totals.
      responses:
        "200":
          description: Portfolio summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      total_properties:
                        type: integer
                      total_properties_rented:
                        type: integer
                      total_tenants:
                        type: integer
                      total_active_leases:
                        type: integer
                      total_outstanding:
                        type: number
                        format: double
                      collection_rate:
                        type: number
                        format: double
                      total_collected_this_month:
                        type: number
                        format: double
                      currency:
                        type: string
                        enum: [EUR]
                      period:
                        type: object
                        properties:
                          month:
                            type: string
                          generated_at:
                            type: string
                            format: date-time
        "401":
          description: Unauthorized

  # ══════════════════════════════════════════════════════════════════════════════
  # E-Reporting — French B2C fiscal reporting
  # ══════════════════════════════════════════════════════════════════════════════

  /e-reporting/export:
    get:
      tags: [E-Reporting]
      summary: Export monthly rent report for French B2C fiscal declaration
      operationId: exportEReporting
      description: |
        Generates a monthly rent collection report for French fiscal declarations.
        Returns detailed transaction data and per-tenant aggregations.
      parameters:
        - name: month
          in: query
          required: true
          schema:
            type: string
            pattern: "^[0-9]{4}-(0[1-9]|1[0-2])$"
          description: "Month in YYYY-MM format (e.g. 2025-06)"
          example: "2025-06"
        - name: format
          in: query
          schema:
            type: string
            enum: [json, csv]
            default: json
      responses:
        "200":
          description: E-reporting export
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EReportingExport"
            text/csv:
              schema:
                type: string
        "400":
          description: Invalid month format or missing parameter
        "401":
          description: Unauthorized

  # ══════════════════════════════════════════════════════════════════════════════
  # Email — Transactional email dispatch
  # ══════════════════════════════════════════════════════════════════════════════

  /email/send-welcome:
    post:
      tags: [Email]
      summary: Send welcome email to newly registered user
      operationId: sendWelcomeEmail
      description: Triggers the welcome email for the currently authenticated user.
      responses:
        "200":
          description: Email sent successfully
        "401":
          description: Unauthorized
        "500":
          description: Failed to send email

  /email/send-rent-reminder:
    post:
      tags: [Email]
      summary: Send rent payment reminder to tenant
      operationId: sendRentReminder
      description: |
        Sends a rent payment reminder email to the tenant associated with a given
        transaction. Tone can be friendly, formal, or legal.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [transactionId]
              properties:
                transactionId:
                  type: string
                  format: uuid
                tone:
                  type: string
                  enum: [friendly, formal, legal]
                  default: friendly
              example:
                transactionId: "123e4567-e89b-12d3-a456-426614174000"
                tone: "formal"
      responses:
        "200":
          description: Reminder sent
        "401":
          description: Unauthorized
        "422":
          description: Invalid request body
        "500":
          description: Failed to send email

  /email/send-lease-expiry:
    post:
      tags: [Email]
      summary: Send lease expiry warning to landlord
      operationId: sendLeaseExpiry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [leaseId]
              properties:
                leaseId:
                  type: string
                  format: uuid
      responses:
        "200":
          description: Email sent
        "401":
          description: Unauthorized
        "422":
          description: Invalid request body
        "500":
          description: Failed to send email

  /email/send-password-reset:
    post:
      tags: [Email]
      summary: Send password reset email
      operationId: sendPasswordReset
      responses:
        "401":
          description: Unauthorized
        "500":
          description: Failed to send email

  /email/send-tenant-invitation:
    post:
      tags: [Email]
      summary: Send tenant portal invitation
      operationId: sendTenantInvitation
      responses:
        "401":
          description: Unauthorized
        "500":
          description: Failed to send email

  /email/cron-dispatch:
    get:
      tags: [Email]
      summary: List supported cron email dispatch types
      operationId: listCronEmailTypes
      responses:
        "200":
          description: Supported email dispatch types
          content:
            application/json:
              schema:
                type: object
                properties:
                  supportedTypes:
                    type: array
                    items:
                      type: object
    post:
      tags: [Email]
      summary: Dispatch a transactional email (cron endpoint)
      operationId: dispatchCronEmail
      description: |
        Batch/automated email dispatch endpoint called by external cron jobs.
        Requires `Authorization: Bearer <CRON_SECRET>` if `CRON_SECRET` env var is set.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type]
              properties:
                type:
                  type: string
                  enum: [rent-reminder, lease-expiry]
                transactionId:
                  type: string
                  format: uuid
                  description: Required for rent-reminder type
                leaseId:
                  type: string
                  format: uuid
                  description: Required for lease-expiry type
                tone:
                  type: string
                  enum: [friendly, formal, legal]
                  default: friendly
      responses:
        "200":
          description: Email sent
        "401":
          description: Unauthorized (invalid or missing CRON_SECRET)
        "422":
          description: Invalid request body
        "500":
          description: Failed to send email

  # ══════════════════════════════════════════════════════════════════════════════
  # Glossary — Static SEO glossary
  # ══════════════════════════════════════════════════════════════════════════════

  /glossary:
    get:
      tags: [Glossary]
      summary: List all glossary terms
      operationId: listGlossary
      description: |
        Returns all real estate glossary terms for the SEO glossary page.
        Publicly cached: `public, max-age=3600, stale-while-revalidate=86400`.
      responses:
        "200":
          description: List of glossary terms
          content:
            application/json:
              schema:
                type: object
                properties:
                  terms:
                    type: array
                    items:
                      type: object
                      properties:
                        slug:
                          type: string
                        term:
                          type: string
                        shortDefinition:
                          type: string
                  total:
                    type: integer
                  updatedAt:
                    type: string
                    format: date-time

  /glossary/{slug}:
    get:
      tags: [Glossary]
      summary: Get a single glossary term
      operationId: getGlossaryTerm
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Glossary term detail
        "404":
          description: Term not found

  # ══════════════════════════════════════════════════════════════════════════════
  # Health — Service health check
  # ══════════════════════════════════════════════════════════════════════════════

  /health:
    get:
      tags: [Health]
      summary: Health check
      operationId: healthCheck
      description: |
        Returns service health status. Public callers receive minimal info
        (`status`, `timestamp`, `version`). Authenticated or internal callers
        also receive database, Redis, and storage health checks.
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [healthy]
                  timestamp:
                    type: string
                    format: date-time
                  version:
                    type: string
        "503":
          description: Service is unhealthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [healthy, unhealthy]
                  timestamp:
                    type: string
                    format: date-time
                  version:
                    type: string
                  environment:
                    type: string
                  checks:
                    type: object

  # ══════════════════════════════════════════════════════════════════════════════
  # Lead — Demo request capture
  # ══════════════════════════════════════════════════════════════════════════════

  /lead/demo:
    post:
      tags: [Lead]
      summary: Submit a demo request
      operationId: submitDemoRequest
      description: Captures demo request leads from the marketing site. Rate limited: 5 req/IP/hour.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email]
              properties:
                name:
                  type: string
                  minLength: 1
                email:
                  type: string
                  format: email
                properties:
                  type: string
                message:
                  type: string
                utm_source:
                  type: string
                utm_medium:
                  type: string
                utm_campaign:
                  type: string
      responses:
        "200":
          description: Demo request captured
        "401":
          description: Unauthorized
        "422":
          description: Invalid request body
        "429":
          description: Rate limit exceeded

  # ══════════════════════════════════════════════════════════════════════════════
  # Maintenance — Ticket tracking
  # ══════════════════════════════════════════════════════════════════════════════

  /maintenance:
    get:
      tags: [Maintenance]
      summary: List maintenance tickets
      operationId: listMaintenance
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - name: status
          in: query
          schema:
            type: string
          description: Filter by status (OPEN, IN_PROGRESS, RESOLVED, CLOSED)
        - name: propertyId
          in: query
          schema:
            type: string
            format: uuid
        - name: priority
          in: query
          schema:
            type: string
            enum: [LOW, MEDIUM, HIGH, URGENT]
      responses:
        "200":
          description: Paginated list of maintenance tickets
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/MaintenanceTicket"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
        "401":
          description: Unauthorized
    post:
      tags: [Maintenance]
      summary: Create a maintenance ticket (owner)
      operationId: createMaintenanceTicket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MaintenanceTicketInput"
      responses:
        "201":
          description: Ticket created
        "400":
          description: Validation error
        "401":
          description: Unauthorized

  /maintenance/{id}:
    get:
      tags: [Maintenance]
      summary: Get a maintenance ticket by ID
      operationId: getMaintenanceTicket
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Maintenance ticket detail
        "401":
          description: Unauthorized
        "403":
          description: Forbidden — ticket belongs to another user
        "404":
          description: Ticket not found
    patch:
      tags: [Maintenance]
      summary: Update a maintenance ticket
      operationId: updateMaintenanceTicket
      description: Automatically sets `resolvedAt` when status transitions to RESOLVED.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MaintenanceTicketInput"
      responses:
        "200":
          description: Ticket updated
        "400":
          description: Validation error
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Ticket not found

  # ══════════════════════════════════════════════════════════════════════════════
  # Metrics — Prometheus-compatible metrics endpoint
  # ══════════════════════════════════════════════════════════════════════════════

  /metrics:
    get:
      tags: [Metrics]
      summary: Prometheus-compatible metrics endpoint
      operationId: getMetrics
      description: Returns application metrics in Prometheus text format.
      responses:
        "200":
          description: Prometheus metrics
          content:
            text/plain; charset=utf-8:
              schema:
                type: string
        "500":
          description: Failed to collect metrics

  # ══════════════════════════════════════════════════════════════════════════════
  # Onboarding — Wizard analytics tracking
  # ══════════════════════════════════════════════════════════════════════════════

  /onboarding/track:
    post:
      tags: [Onboarding]
      summary: Track onboarding wizard events
      operationId: trackOnboardingEvent
      description: |
        Records onboarding step completions, skips, and drop-offs.
        Events: onboarding_started, onboarding_step_1_completed, onboarding_step_1_skipped,
        onboarding_step_2_completed, onboarding_step_2_skipped, onboarding_lease_completed,
        onboarding_completed, onboarding_abandoned.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [event]
              properties:
                event:
                  type: string
                  description: Onboarding event name
                metadata:
                  type: object
                  description: Additional event metadata (propertyId, tenantId, step)
      responses:
        "200":
          description: Event tracked
        "400":
          description: Missing or invalid event
        "401":
          description: Unauthorized
        "500":
          description: Failed to track event

