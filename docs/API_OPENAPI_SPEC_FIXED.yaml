        "404":
          description: Guarantor not found

    patch:
      tags: [Guarantors]
      summary: Update a guarantor
      operationId: updateGuarantor
      security:
        - cookieAuth: []
      parameters:
        - name: guarantorId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GuarantorCreate"
      responses:
        "200":
          description: Guarantor updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Guarantor"
