  # Reminders — Task and deadline reminders
  # ══════════════════════════════════════════════════════════════════════════════

  /reminders:
    get:
      tags: [Reminders]
      summary: List reminders
      operationId: listReminders
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - name: status
          in: query
          schema:
            type: string
            enum: [PENDING, COMPLETED, SNOOZED, CANCELLED]
        - name: type
          in: query
          schema:
            type: string
        - name: priority
          in: query
          schema:
            type: string
        - name: leaseId
          in: query
          schema:
            type: string
            format: uuid
        - name: propertyId
          in: query
          schema:
            type: string
            format: uuid
        - name: overdue
          in: query
          schema:
            type: string
          description: Set to "true" to return only overdue reminders
      responses:
        "200":
          description: Paginated list of reminders
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Reminder"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
        "401":
          description: Unauthorized
    post:
      tags: [Reminders]
      summary: Create a reminder
      operationId: createReminder
      description: Creates a one-time or recurring reminder. Computes `nextDueDate` for recurring.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReminderInput"
      responses:
        "201":
          description: Reminder created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Reminder"
        "400":
          description: Validation error
        "401":
          description: Unauthorized
        "404":
          description: Associated lease, property, or tenant not found

  /reminders/{id}:
    get:
      tags: [Reminders]
      summary: Get a reminder by ID
      operationId: getReminder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Reminder detail
        "401":
          description: Unauthorized
        "404":
          description: Reminder not found
    patch:
      tags: [Reminders]
      summary: Update or transition a reminder
      operationId: updateReminder
      description: |
        Supports status-only transitions (`{"status": "COMPLETED"}`) and full updates.
        For recurring reminders marked COMPLETED, automatically computes nextDueDate.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/ReminderStatusTransition"
                - $ref: "#/components/schemas/ReminderInput"
      responses:
        "200":
          description: Reminder updated
        "400":
          description: Invalid status or validation error
        "401":
          description: Unauthorized
        "404":
          description: Reminder not found
    delete:
      tags: [Reminders]
      summary: Delete a reminder
      operationId: deleteReminder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Reminder deleted
        "401":
          description: Unauthorized
        "404":
          description: Reminder not found

  /reminders/send:
    post:
      tags: [Reminders]
      summary: Manually trigger a reminder email
      operationId: sendReminder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reminderId]
              properties:
                reminderId:
                  type: string
                  format: uuid
      responses:
        "200":
          description: Reminder sent
        "401":
          description: Unauthorized
        "404":
          description: Reminder not found

