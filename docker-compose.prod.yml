# ========================================
# Docker Compose Override for Production
# ========================================
version: '3.9'

services:
  # ========================================
  # Production Database
  # ========================================
  postgres:
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

  # ========================================
  # Redis — Production
  # ========================================
  # OPTION A (Recommended): Use Upstash Serverless Redis (managed HTTP REST).
  #   1. Create a database at https://console.upstash.com/
  #   2. Copy the REST URL and token into your deployment env vars:
  #      UPSTASH_REDIS_REST_URL=https://your-instance.upstash.io
  #      UPSTASH_REDIS_REST_TOKEN=your_rest_token
  #   3. Do NOT include the redis service below (Upstash is cloud-hosted).
  #
  # OPTION B (Self-hosted): Use a REST-to-RESP bridge in front of Redis.
  #   - @upstash/redis requires HTTP REST, not plain Redis RESP protocol.
  #   - For self-hosted, add a Redis + REST bridge proxy container.
  #   - Or use Upstash's self-hosted option: https://github.com/upstash/redis
  #
  # redis:
  #   image: redis:7-alpine
  #   command: ["redis-server", "--port", "6379", "--requirepass", "${REDIS_PASSWORD:-}"]
  #   deploy:
  #     resources:
  #       limits:
  #         cpus: '0.5'
  #         memory: 512M

  # ========================================
  # Production App
  # ========================================
  app:
    environment:
      NODE_ENV: production
      LOG_LEVEL: warn
      MINIO_USE_SSL: "true"
      # Rate limiting: set both to activate Upstash Redis (see above).
      # Without these, the app uses the in-memory fallback (not recommended for multi-instance prod).
      UPSTASH_REDIS_REST_URL: ${UPSTASH_REDIS_REST_URL}
      UPSTASH_REDIS_REST_TOKEN: ${UPSTASH_REDIS_REST_TOKEN}
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
