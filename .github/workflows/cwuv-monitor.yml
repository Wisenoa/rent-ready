# ========================================
# Core Web Vitals — CrUX Field Monitoring
# ========================================
# Pulls real-user field data from Google Chrome UX Report
# via PageSpeed Insights API and alerts on regressions.
#
# Required GitHub Secrets:
#   GOOGLE_PAGESPEED_API_KEY — Google PSI API key (free tier: 25k calls/day)
#   SLACK_WEBHOOK_URL        — Slack webhook for CWV alerts
#
# Optional:
#   SKIP_CWUV=1              — Skip this job (e.g., during freeze periods)
# ========================================

name: CWV — CrUX Field Monitoring

on:
  schedule:
    # Run daily at 8am UTC — catches CrUX data which updates ~daily
    - cron: "0 8 * * *"
  workflow_dispatch:
    # Manual trigger for on-demand checks
    inputs:
      url:
        description: "Single URL to check (leave blank for all pages)"
        required: false
        type: string

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "10.33.0"

jobs:
  # ========================================
  # CrUX Field Data via PageSpeed Insights
  # ========================================
  crux-monitor:
    name: CrUX Monitor
    runs-on: ubuntu-latest
    if: env.SKIP_CWUV != '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter rent-ready

      - name: Run CrUX monitor
        run: node scripts/monitor-cwuv.mjs --alert-slack ${{ inputs.url && format('--url={0}', inputs.url) || '' }}
        env:
          GOOGLE_PAGESPEED_API_KEY: ${{ secrets.GOOGLE_PAGESPEED_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          CI: "true"
        continue-on-error: true

      - name: Parse CrUX results (set output)
        id: crux-results
        run: |
          # Capture exit code from previous step and surface results
          EXIT_CODE=$?
          echo "CrUX exit code: $EXIT_CODE"
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          
          if [ $EXIT_CODE -eq 1 ]; then
            echo "result=failed" >> $GITHUB_OUTPUT
            echo "summary::warning::Core Web Vitals regressions detected — see logs" >> $GITHUB_OUTPUT
          elif [ $EXIT_CODE -eq 2 ]; then
            echo "result=api_error" >> $GITHUB_OUTPUT
            echo "summary::warning::CrUX API error — check configuration" >> $GITHUB_OUTPUT
          else
            echo "result=pass" >> $GITHUB_OUTPUT
            echo "summary::All Core Web Vitals passing" >> $GITHUB_OUTPUT
          fi

      # Send Slack notification on failure (separate step so we can always run it)
      - name: Slack alert on CWV failure
        if: steps.crux-results.outputs.result == 'failed'
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": ":warning: Core Web Vitals Regression Detected",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*:warning: Core Web Vitals regressions detected on rentready.io*\n_CrUX field data via PageSpeed Insights | <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  # ========================================
  # Summary comment on PR (if triggered manually on a PR)
  # ========================================
  comment-on-pr:
    name: Post CWV Report
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.pull_request != null
    needs: crux-monitor
    steps:
      - name: Post CWV results as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## :chart_with_upwards_trend: Core Web Vitals Report\n\n**CrUX field data** — mobile strategy\n\n> Report generated by \`scripts/monitor-cwuv.mjs\` | <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>\n\n_Check the Actions log for detailed per-metric results._\n\n| Metric | Target | Tool |\n|--------|--------|------|\n| LCP | < 2.5s | CrUX (field) |\n| CLS | < 0.1 | CrUX (field) |\n| INP | < 200ms | CrUX (field) |\n| FCP | < 1.8s | CrUX (field) |\n| TTFB | < 800ms | CrUX (field) |`
            })
